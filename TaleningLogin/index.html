<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talening 登入</title>
<style>
  :root {
    --bg-deep-1: #0B1120;
    --bg-deep-2: #141E38;
    --bg-deep-3: #1E2A44;
    --brand-purple: #A855F7;
    --brand-blue: #4F7CFF;
    --brand-teal: #2DD4E8;
    --brand-pink: #EC4899;
    --glow-purple: rgba(139, 63, 232, 0.50);
    --glow-teal: rgba(45, 212, 232, 0.42);
    --glow-blue: rgba(79, 124, 255, 0.40);
    --glow-pink: rgba(236, 72, 153, 0.38);
    --text-light: #CBD5E1;
    --text-muted: #94A3B8;
    --text-faint: #64748B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-deep-1) 0%, var(--bg-deep-2) 55%, var(--bg-deep-3) 100%);
    position: relative;
    overflow: hidden;
    padding: 20px;
  }

  /* 右上角紫色光暈 — 最亮點貼齊右上角 */
  body::before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 460px;
    height: 460px;
    background: radial-gradient(circle at top right, var(--glow-purple), transparent 65%);
    pointer-events: none;
  }

  /* 左下角青色光暈 — 最亮點貼齊左下角 */
  body::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle at bottom left, var(--glow-teal), transparent 65%);
    pointer-events: none;
  }

  /* 額外兩球:藍(左上角)+ 洋紅(右下角) */
  .glow-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .glow-layer .blue {
    position: absolute;
    top: 0;
    left: 0;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle at top left, var(--glow-blue), transparent 65%);
  }
  .glow-layer .pink {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 440px;
    height: 440px;
    background: radial-gradient(circle at bottom right, var(--glow-pink), transparent 65%);
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 400px;
    max-width: 100%;
    padding: 42px 38px;
    border-radius: 20px;
    background: rgba(20, 28, 48, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.10);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .brand-bars {
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 32px;
  }
  .brand-bars span {
    width: 7px;
    border-radius: 3px;
  }
  .bar1 { height: 17px; background: linear-gradient(180deg, #A855F7, #4F7CFF); }
  .bar2 { height: 28px; background: linear-gradient(180deg, #8B3FE8, #2DD4E8); }
  .bar3 { height: 22px; background: linear-gradient(180deg, #4F7CFF, #2DD4E8); }
  .bar4 { height: 14px; background: linear-gradient(180deg, #2DD4E8, #EC4899); }

  .brand-name {
    color: #fff;
    font-size: 25px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    font-style: italic;
    margin-bottom: 30px;
  }

  .field-label {
    display: block;
    color: var(--text-light);
    font-size: 13px;
    margin-bottom: 7px;
  }

  .field {
    display: flex;
    align-items: center;
    gap: 9px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 11px;
    padding: 0 14px;
    margin-bottom: 18px;
    transition: border-color 0.2s, background 0.2s;
  }
  .field:focus-within {
    border-color: var(--brand-blue);
    background: rgba(255, 255, 255, 0.09);
  }
  .field svg { flex-shrink: 0; color: var(--text-faint); }
  .field input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 14px;
    padding: 13px 0;
  }
  .field input::placeholder { color: var(--text-faint); }
  .toggle-pw { cursor: pointer; color: var(--text-faint); }
  .toggle-pw:hover { color: var(--text-light); }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 26px;
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .remember input {
    width: 16px;
    height: 16px;
    accent-color: var(--brand-blue);
    cursor: pointer;
  }
  .forgot {
    color: var(--brand-blue);
    font-size: 13px;
    text-decoration: none;
  }
  .forgot:hover { text-decoration: underline; }

  .btn-login {
    width: 100%;
    border: none;
    padding: 14px;
    border-radius: 11px;
    background: linear-gradient(90deg, #8B3FE8, #4F7CFF, #2DD4E8);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-login:hover { opacity: 0.92; }
  .btn-login:active { transform: scale(0.99); }

  .footer-text {
    margin-top: 22px;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
  }
  .footer-text a {
    color: var(--brand-teal);
    text-decoration: none;
  }
  .footer-text a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="glow-layer">
    <div class="blue"></div>
    <div class="pink"></div>
  </div>
  <div class="login-card">
    <div class="brand">
      <div class="brand-bars">
        <span class="bar1"></span>
        <span class="bar2"></span>
        <span class="bar3"></span>
        <span class="bar4"></span>
      </div>
      <span class="brand-name">Talening</span>
    </div>
    <p class="subtitle">歡迎回來,請登入你的帳號</p>

    <form onsubmit="return false;">
      <label class="field-label" for="email">Email</label>
      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        <input type="email" id="email" placeholder="name@company.com" autocomplete="email">
      </div>

      <label class="field-label" for="password">密碼</label>
      <div class="field">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <svg class="toggle-pw" id="togglePw" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox"> 記住我
        </label>
        <a href="#" class="forgot">忘記密碼?</a>
      </div>

      <button type="submit" class="btn-login">登入</button>
    </form>

    <p class="footer-text">還沒有帳號? <a href="#">聯絡管理員</a></p>
  </div>

  <script>
    const toggle = document.getElementById('togglePw');
    const pw = document.getElementById('password');
    toggle.addEventListener('click', () => {
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
